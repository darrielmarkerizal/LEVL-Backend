[program:levl-queue-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /path/to/Levl-BE/artisan queue:work redis --queue=emails-critical,emails-transactional,grading,notifications,file-processing,trash,logging,audit,gamification,default --sleep=3 --tries=3 --max-time=3600 --timeout=900
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=www-data
numprocs=2
redirect_stderr=true
stdout_logfile=/path/to/Levl-BE/storage/logs/queue-worker.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
stopwaitsecs=3600
