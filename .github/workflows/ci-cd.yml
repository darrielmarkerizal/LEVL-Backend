name: CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify CI Trigger
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message || github.event.pull_request.title || 'N/A' }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          SAFE_MSG=$(echo "$COMMIT_MSG" | tr '\n' ' ' | head -c 200)
          MESSAGE="🚀 *CI/CD TRIGGERED*
          📦 *Repository:* \`${{ github.repository }}\`
          🌿 *Branch:* \`${{ github.ref_name }}\`
          👤 *By:* \`${{ github.actor }}\`
          🆔 *Commit:* \`${SHORT_SHA}\`
          📝 *Message:* ${SAFE_MSG}
          🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          🔗 [Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          bash .github/scripts/telegram.sh \
            "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            "${{ secrets.TELEGRAM_CHAT_ID }}" \
            "$MESSAGE"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_pgsql, pgsql, zip, gd, bcmath, exif, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1

      - name: Validate composer.json
        run: composer validate --strict

  deploy:
    name: Deploy to VPS
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify Deploy Start
        continue-on-error: true
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MESSAGE="🔨 *DEPLOYMENT STARTED*
          📦 *Repository:* \`${{ github.repository }}\`
          🌿 *Branch:* \`main\`
          🖥 *Server:* \`${{ secrets.DEPLOY_SERVER }}\`
          🆔 *Commit:* \`${SHORT_SHA}\`
          ⚙️ Status: *Deploying to VPS...*"
          bash .github/scripts/telegram.sh \
            "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            "${{ secrets.TELEGRAM_CHAT_ID }}" \
            "$MESSAGE"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_SERVER }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60m
          command_timeout: 60m
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # ── Rollback: save current commit before pulling ──────────────────
            PREVIOUS_COMMIT=$(git rev-parse HEAD)
            echo "Previous commit: $PREVIOUS_COMMIT"

            # ── Rollback handler: restore if anything fails ───────────────────
            rollback() {
              echo "⚠️  Deployment failed — rolling back to $PREVIOUS_COMMIT"
              git reset --hard "$PREVIOUS_COMMIT"
              composer install --no-dev --optimize-autoloader --quiet

              # Rollback last migration batch through direct PostgreSQL port
              php artisan migrate:rollback --database=pgsql_migrate --force --quiet || true

              # Clear all caches only — skip rebuilding to avoid stale cache errors
              php artisan optimize:clear --quiet || true

              php artisan up
              sudo systemctl restart octane
              echo "✅ Rollback complete"
              exit 1
            }
            trap rollback ERR

            # ── Enable maintenance mode ───────────────────────────────────────
            php artisan down --retry=10 --render="errors::503"

            # ── Pull latest code ──────────────────────────────────────────────
            git reset --hard HEAD
            git pull origin main

            # ── Install dependencies ──────────────────────────────────────────
            composer install --no-dev --optimize-autoloader

            # ── Run migrations via direct PostgreSQL (bypass PgBouncer) ─────
            php artisan migrate --database=pgsql_migrate --force

            # ── Clear & rebuild all caches (no view:cache — pure API) ──────────
            php artisan optimize:clear
            php artisan config:cache
            php artisan event:cache
            php artisan route:cache

            # ── Restart Octane via systemd ────────────────────────────────────
            sudo systemctl restart octane

            # ── Restart queue workers (long-lived processes) ─────────────────
            # Avoid shell glob expansion issues on zsh by restarting explicit names from supervisor status.
            QUEUE_PROCESSES=$(sudo supervisorctl status | awk '/^levl-queue-worker:/{print $1}')

            if [ -n "$QUEUE_PROCESSES" ]; then
              while read -r PROC; do
                echo "Restarting $PROC..."
                sudo supervisorctl restart "$PROC" || echo "Skipping failed restart for $PROC"
              done <<< "$QUEUE_PROCESSES"
            else
              echo "⚠️ No levl-queue-worker processes found"
            fi

            # ── Bring application back online ─────────────────────────────────
            php artisan up

            # Deployment succeeded — disarm the rollback trap
            trap - ERR
            echo "✅ Deployment successful"

      - name: Notify Deploy Success
        if: success()
        continue-on-error: true
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MESSAGE="✅ *DEPLOYMENT SUCCESS*
          📦 *Repository:* \`${{ github.repository }}\`
          🌿 *Branch:* \`main\`
          🖥 *Server:* \`${{ secrets.DEPLOY_SERVER }}\`
          🆔 *Commit:* \`${SHORT_SHA}\`
          🟢 Status: *Application is LIVE*
          🔗 [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          🔗 [Workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          bash .github/scripts/telegram.sh \
            "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            "${{ secrets.TELEGRAM_CHAT_ID }}" \
            "$MESSAGE"

      - name: Notify Deploy Failure
        if: failure()
        continue-on-error: true
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          MESSAGE="❌ *DEPLOYMENT FAILED*
          📦 *Repository:* \`${{ github.repository }}\`
          🌿 *Branch:* \`main\`
          🖥 *Server:* \`${{ secrets.DEPLOY_SERVER }}\`
          🆔 *Commit:* \`${SHORT_SHA}\`
          🔴 Status: *Deployment failed — rollback executed*
          🔗 [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          bash .github/scripts/telegram.sh \
            "${{ secrets.TELEGRAM_BOT_TOKEN }}" \
            "${{ secrets.TELEGRAM_CHAT_ID }}" \
            "$MESSAGE"